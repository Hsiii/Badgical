<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Badgical Logo Color Lab</title>
        <style>
            :root {
                --clr-slate-indigo: #5968c9;
                --clr-lavender-purple: #9972d3;
                --clr-lavender: #dbdaec;
                --clr-graphite: #30334c;
                --clr-bg: #ffffff;
                --clr-surface: #ffffff;
                --clr-card: #f6f7f9;
                --clr-text: var(--clr-graphite);
                --clr-text-strong: #1f2238;
                --clr-text-muted: #5b607f;
                --clr-border: var(--clr-lavender);
                --clr-accent: var(--clr-slate-indigo);
                --clr-control: #f4f3fb;
                --clr-edge-shadow: rgb(48 51 76 / 16%);

                --space-1: 4px;
                --space-2: 8px;
                --space-3: 12px;
                --space-4: 16px;
                --space-5: 20px;
                --space-6: 24px;
                --space-8: 32px;
                --radius-1: 4px;
                --radius-2: 8px;
            }

            * {
                box-sizing: border-box;
            }

            body {
                min-width: 320px;
                margin: 0;
                background: var(--clr-bg);
                color: var(--clr-text);
                font-family:
                    Inter,
                    ui-sans-serif,
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    'Segoe UI',
                    sans-serif;
            }

            button,
            input,
            textarea {
                font: inherit;
            }

            .shell {
                width: min(1120px, calc(100% - var(--space-8)));
                margin: 0 auto;
                padding: var(--space-8) 0;
            }

            .topbar {
                display: flex;
                flex-wrap: wrap;
                gap: var(--space-4);
                align-items: end;
                justify-content: space-between;
                margin-bottom: var(--space-6);
            }

            h1,
            h2 {
                margin: 0;
                color: var(--clr-text-strong);
                letter-spacing: 0;
            }

            h1 {
                font-size: 24px;
                line-height: 1.16;
            }

            h2 {
                font-size: 16px;
                line-height: 1.25;
            }

            .status {
                min-height: 20px;
                margin-top: var(--space-2);
                color: var(--clr-text-muted);
                font-size: 14px;
            }

            .actions {
                display: flex;
                flex-wrap: wrap;
                gap: var(--space-2);
            }

            .layout {
                display: grid;
                grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
                gap: var(--space-6);
                align-items: start;
            }

            .panel {
                border: 1px solid var(--clr-border);
                border-radius: var(--radius-2);
                background: var(--clr-surface);
                box-shadow: 0 16px 32px var(--clr-edge-shadow);
            }

            .controls,
            .output {
                padding: var(--space-5);
            }

            .controls {
                display: grid;
                gap: var(--space-4);
            }

            .field {
                display: grid;
                gap: var(--space-2);
            }

            label {
                color: var(--clr-text-strong);
                font-size: 13px;
                font-weight: 700;
            }

            .color-row {
                display: grid;
                grid-template-columns: 48px minmax(0, 1fr);
                gap: var(--space-2);
            }

            input[type='color'] {
                width: 48px;
                height: 40px;
                padding: 0;
                border: 1px solid var(--clr-border);
                border-radius: var(--radius-1);
                background: var(--clr-control);
            }

            input[type='text'] {
                width: 100%;
                height: 40px;
                border: 1px solid var(--clr-border);
                border-radius: var(--radius-1);
                background: var(--clr-control);
                color: var(--clr-text-strong);
                padding: 0 var(--space-3);
            }

            button {
                min-height: 40px;
                border: 1px solid var(--clr-border);
                border-radius: var(--radius-1);
                background: var(--clr-control);
                color: var(--clr-text-strong);
                padding: 0 var(--space-4);
                cursor: pointer;
            }

            button.primary {
                border-color: var(--clr-accent);
                background: var(--clr-accent);
                color: var(--clr-bg);
            }

            button:focus-visible,
            input:focus-visible,
            textarea:focus-visible {
                outline: 2px solid var(--clr-accent);
                outline-offset: 2px;
            }

            .preview-wrap {
                display: grid;
                min-height: 360px;
                place-items: center;
                border-bottom: 1px solid var(--clr-border);
                border-radius: var(--radius-2) var(--radius-2) 0 0;
                background:
                    linear-gradient(
                        45deg,
                        var(--clr-card) 25%,
                        transparent 25%
                    ),
                    linear-gradient(
                        -45deg,
                        var(--clr-card) 25%,
                        transparent 25%
                    ),
                    linear-gradient(
                        45deg,
                        transparent 75%,
                        var(--clr-card) 75%
                    ),
                    linear-gradient(
                        -45deg,
                        transparent 75%,
                        var(--clr-card) 75%
                    );
                background-color: var(--preview-bg, #ffffff);
                background-position:
                    0 0,
                    0 8px,
                    8px -8px,
                    -8px 0;
                background-size: 16px 16px;
                padding: var(--space-8);
            }

            .preview-wrap svg {
                width: min(256px, 72vw);
                height: auto;
                image-rendering: auto;
            }

            .output {
                display: grid;
                gap: var(--space-4);
            }

            textarea {
                width: 100%;
                min-height: 220px;
                resize: vertical;
                border: 1px solid var(--clr-border);
                border-radius: var(--radius-1);
                background: var(--clr-control);
                color: var(--clr-text-strong);
                padding: var(--space-3);
                font-family:
                    'SFMono-Regular', Consolas, 'Liberation Mono', Menlo,
                    monospace;
                font-size: 12px;
                line-height: 1.5;
            }

            .saved-list {
                display: grid;
                gap: var(--space-2);
            }

            .saved-item {
                display: grid;
                grid-template-columns: 32px minmax(0, 1fr) auto;
                gap: var(--space-2);
                align-items: center;
                min-height: 40px;
                border: 1px solid var(--clr-border);
                border-radius: var(--radius-1);
                padding: var(--space-1) var(--space-2);
            }

            .swatch {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                width: 32px;
                height: 32px;
                overflow: hidden;
                border: 1px solid var(--clr-border);
                border-radius: var(--radius-1);
            }

            .saved-name {
                overflow: hidden;
                color: var(--clr-text-strong);
                font-size: 13px;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            @media (width <= 760px) {
                .shell {
                    width: min(100% - var(--space-4), 1120px);
                    padding: var(--space-4) 0;
                }

                .layout {
                    grid-template-columns: 1fr;
                }

                .preview-wrap {
                    min-height: 280px;
                    padding: var(--space-6);
                }
            }
        </style>
    </head>
    <body>
        <main class="shell">
            <header class="topbar">
                <div>
                    <h1>Badgical Logo Color Lab</h1>
                    <div class="status" id="status" aria-live="polite"></div>
                </div>
                <div class="actions">
                    <button type="button" id="copySvg">Copy SVG</button>
                    <button type="button" id="downloadSvg">Download SVG</button>
                    <button type="button" id="copyContext" class="primary">
                        Copy Context
                    </button>
                </div>
            </header>

            <section class="layout" aria-label="Logo color editor">
                <aside class="panel controls">
                    <div class="field">
                        <label for="badgeColor">Badge color</label>
                        <div class="color-row">
                            <input
                                id="badgeColor"
                                type="color"
                                value="#5968c9"
                            />
                            <input
                                id="badgeText"
                                type="text"
                                value="#5968c9"
                                spellcheck="false"
                            />
                        </div>
                    </div>

                    <div class="field">
                        <label for="sparkStartColor"
                            >Spark gradient start</label
                        >
                        <div class="color-row">
                            <input
                                id="sparkStartColor"
                                type="color"
                                value="#8550dd"
                            />
                            <input
                                id="sparkStartText"
                                type="text"
                                value="#8550dd"
                                spellcheck="false"
                            />
                        </div>
                    </div>

                    <div class="field">
                        <label for="sparkEndColor">Spark gradient end</label>
                        <div class="color-row">
                            <input
                                id="sparkEndColor"
                                type="color"
                                value="#c6b7ff"
                            />
                            <input
                                id="sparkEndText"
                                type="text"
                                value="#c6b7ff"
                                spellcheck="false"
                            />
                        </div>
                    </div>

                    <div class="field">
                        <label for="backgroundColor">Preview background</label>
                        <div class="color-row">
                            <input
                                id="backgroundColor"
                                type="color"
                                value="#ffffff"
                            />
                            <input
                                id="backgroundText"
                                type="text"
                                value="#ffffff"
                                spellcheck="false"
                            />
                        </div>
                    </div>

                    <div class="actions">
                        <button type="button" id="saveChoice">
                            Save Choice
                        </button>
                        <button type="button" id="resetChoice">Reset</button>
                    </div>

                    <section class="field" aria-label="Saved choices">
                        <h2>Saved Choices</h2>
                        <div class="saved-list" id="savedList"></div>
                    </section>
                </aside>

                <section class="panel" aria-label="SVG preview and output">
                    <div class="preview-wrap" id="previewWrap">
                        <div id="preview"></div>
                    </div>
                    <div class="output">
                        <h2>SVG Output</h2>
                        <textarea id="svgOutput" spellcheck="false"></textarea>
                    </div>
                </section>
            </section>
        </main>

        <script>
            const storageKey = 'badgical.logoColorLab';
            const defaults = {
                badge: '#5968c9',
                sparkStart: '#8550dd',
                sparkEnd: '#c6b7ff',
                background: '#ffffff',
            };

            const fields = {
                badge: ['badgeColor', 'badgeText'],
                sparkStart: ['sparkStartColor', 'sparkStartText'],
                sparkEnd: ['sparkEndColor', 'sparkEndText'],
                background: ['backgroundColor', 'backgroundText'],
            };

            const state = {
                ...defaults,
                saved: [],
            };

            const elements = {
                preview: document.querySelector('#preview'),
                previewWrap: document.querySelector('#previewWrap'),
                savedList: document.querySelector('#savedList'),
                status: document.querySelector('#status'),
                svgOutput: document.querySelector('#svgOutput'),
            };

            function normalizeHex(value) {
                const trimmed = value.trim();

                if (/^#[0-9a-f]{6}$/i.test(trimmed)) {
                    return trimmed.toLowerCase();
                }

                if (/^#[0-9a-f]{3}$/i.test(trimmed)) {
                    return `#${trimmed
                        .slice(1)
                        .split('')
                        .map((digit) => digit + digit)
                        .join('')}`.toLowerCase();
                }

                return null;
            }

            function makeSvg(values) {
                return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Badgical spark">
    <defs>
        <linearGradient id="spark-fill" x1="8" x2="24" y1="22" y2="2" gradientUnits="userSpaceOnUse">
            <stop stop-color="${values.sparkStart}" />
            <stop offset="1" stop-color="${values.sparkEnd}" />
        </linearGradient>
        <path id="spark-shape" d="M15.52 2.24c.36-1.04 1.84-1.04 2.2 0l1.64 4.68a6.94 6.94 0 0 0 4.24 4.24l4.68 1.64c1.04.36 1.04 1.84 0 2.2l-4.68 1.64a6.94 6.94 0 0 0-4.24 4.24l-1.64 4.68c-.36 1.04-1.84 1.04-2.2 0l-1.64-4.68a6.94 6.94 0 0 0-4.24-4.24L4.96 15c-1.04-.36-1.04-1.84 0-2.2l4.68-1.64a6.94 6.94 0 0 0 4.24-4.24l1.64-4.68Z" />
        <g id="badge-shape">
            <rect x="3.2" y="20.8" width="26.8" height="9.2" rx="2.4" />
            <rect x="18.6" y="20.8" width="11.4" height="9.2" rx="2.4" />
        </g>
    </defs>
    <use href="#badge-shape" fill="${values.badge}" />
    <use href="#spark-shape" fill="url(#spark-fill)" />
</svg>`;
            }

            function getContextPayload() {
                return JSON.stringify(
                    {
                        source: 'public/logo-color-lab.html',
                        targetLogo: 'public/badgical-spark.svg',
                        colors: {
                            badge: state.badge,
                            sparkGradientStart: state.sparkStart,
                            sparkGradientEnd: state.sparkEnd,
                            previewBackground: state.background,
                        },
                        svg: makeSvg(state),
                    },
                    null,
                    2
                );
            }

            function persist() {
                localStorage.setItem(
                    storageKey,
                    JSON.stringify({
                        badge: state.badge,
                        sparkStart: state.sparkStart,
                        sparkEnd: state.sparkEnd,
                        background: state.background,
                        saved: state.saved,
                    })
                );
            }

            function setStatus(message) {
                elements.status.textContent = message;
            }

            function renderSaved() {
                elements.savedList.replaceChildren();

                if (state.saved.length === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'status';
                    empty.textContent = 'No saved choices yet.';
                    elements.savedList.append(empty);
                    return;
                }

                state.saved.forEach((choice, index) => {
                    const row = document.createElement('div');
                    row.className = 'saved-item';

                    const swatch = document.createElement('div');
                    swatch.className = 'swatch';
                    [choice.badge, choice.sparkStart, choice.sparkEnd].forEach(
                        (color) => {
                            const tile = document.createElement('span');
                            tile.style.background = color;
                            swatch.append(tile);
                        }
                    );

                    const name = document.createElement('div');
                    name.className = 'saved-name';
                    name.textContent = `${choice.badge} / ${choice.sparkStart} / ${choice.sparkEnd}`;

                    const button = document.createElement('button');
                    button.type = 'button';
                    button.textContent = 'Use';
                    button.addEventListener('click', () => {
                        Object.assign(state, choice);
                        syncInputs();
                        render();
                        setStatus(`Loaded saved choice ${index + 1}.`);
                    });

                    row.append(swatch, name, button);
                    elements.savedList.append(row);
                });
            }

            function render() {
                const svg = makeSvg(state);
                elements.preview.innerHTML = svg;
                elements.svgOutput.value = svg;
                elements.previewWrap.style.setProperty(
                    '--preview-bg',
                    state.background
                );
                renderSaved();
                persist();
            }

            function syncInputs() {
                Object.entries(fields).forEach(([key, ids]) => {
                    ids.forEach((id) => {
                        document.querySelector(`#${id}`).value = state[key];
                    });
                });
            }

            function updateField(key, value) {
                const normalized = normalizeHex(value);

                if (!normalized) {
                    setStatus('Use a 3 or 6 digit hex color.');
                    return;
                }

                state[key] = normalized;
                syncInputs();
                render();
                setStatus('');
            }

            function download(filename, content, type) {
                const blob = new Blob([content], { type });
                const url = URL.createObjectURL(blob);
                const anchor = document.createElement('a');
                anchor.href = url;
                anchor.download = filename;
                anchor.click();
                URL.revokeObjectURL(url);
            }

            function loadStoredState() {
                const stored = localStorage.getItem(storageKey);

                if (!stored) {
                    return;
                }

                try {
                    const parsed = JSON.parse(stored);
                    Object.keys(defaults).forEach((key) => {
                        const color = normalizeHex(parsed[key] || '');

                        if (color) {
                            state[key] = color;
                        }
                    });
                    state.saved = Array.isArray(parsed.saved)
                        ? parsed.saved
                        : [];
                } catch {
                    setStatus('Saved local choices could not be loaded.');
                }
            }

            Object.entries(fields).forEach(([key, ids]) => {
                ids.forEach((id) => {
                    document
                        .querySelector(`#${id}`)
                        .addEventListener('input', (event) => {
                            updateField(key, event.target.value);
                        });
                });
            });

            document
                .querySelector('#copySvg')
                .addEventListener('click', async () => {
                    await navigator.clipboard.writeText(makeSvg(state));
                    setStatus('SVG copied.');
                });

            document
                .querySelector('#copyContext')
                .addEventListener('click', async () => {
                    await navigator.clipboard.writeText(getContextPayload());
                    setStatus('Context copied.');
                });

            document
                .querySelector('#downloadSvg')
                .addEventListener('click', () => {
                    download(
                        'badgical-spark-test.svg',
                        makeSvg(state),
                        'image/svg+xml'
                    );
                    setStatus('SVG downloaded.');
                });

            document
                .querySelector('#saveChoice')
                .addEventListener('click', () => {
                    const choice = {
                        badge: state.badge,
                        sparkStart: state.sparkStart,
                        sparkEnd: state.sparkEnd,
                        background: state.background,
                    };
                    state.saved = [
                        choice,
                        ...state.saved.filter(
                            (item) =>
                                JSON.stringify(item) !== JSON.stringify(choice)
                        ),
                    ].slice(0, 8);
                    render();
                    setStatus('Choice saved in this browser.');
                });

            document
                .querySelector('#resetChoice')
                .addEventListener('click', () => {
                    Object.assign(state, defaults);
                    syncInputs();
                    render();
                    setStatus('Reset to current logo colors.');
                });

            loadStoredState();
            syncInputs();
            render();
        </script>
    </body>
</html>
